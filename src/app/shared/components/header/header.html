<header [class.scrolled]="isScrolled()">
  <div class="container nav-inner">

    <!-- Logo -->
    <a class="logo" routerLink="/" aria-label="Coupon Villa Home">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-hidden="true">
        <rect x="3" y="10" width="30" height="16" rx="3" fill="rgba(232,67,80,0.12)" stroke="#e84350" stroke-width="1.5"/>
        <circle cx="3" cy="18" r="4" fill="var(--color-bg)" stroke="#e84350" stroke-width="1.5"/>
        <circle cx="33" cy="18" r="4" fill="var(--color-bg)" stroke="#e84350" stroke-width="1.5"/>
        <line x1="3" y1="18" x2="33" y2="18" stroke="#e84350" stroke-width="1" stroke-dasharray="3 2"/>
        <text x="18" y="22" text-anchor="middle" font-size="9" font-weight="800" fill="#e84350" font-family="Poppins,sans-serif">%</text>
      </svg>
      <span class="logo-text">Coupon<span class="logo-accent">Villa</span></span>
    </a>

    <!-- Desktop Nav -->
    <nav class="nav-links" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Home</a>
      <a routerLink="/products" routerLinkActive="active">All Coupons</a>
      <a href="#brands">Top Brands</a>
      <a href="#contact">Contact</a>
    </nav>

    <!-- Actions -->
    <div class="nav-actions">
      <a routerLink="/products" class="btn-primary">Browse Deals 🔥</a>
    </div>

    <!-- Mobile hamburger -->
    <button class="hamburger" (click)="toggleMenu()"
            [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  @if (menuOpen()) {
    <div class="mobile-menu">
      <a routerLink="/" (click)="toggleMenu()">Home</a>
      <a routerLink="/products" (click)="toggleMenu()">All Coupons</a>
      <a href="#brands" (click)="toggleMenu()">Top Brands</a>
      <a href="#contact" (click)="toggleMenu()">Contact</a>
      <a routerLink="/products" class="btn-primary mobile-cta" (click)="toggleMenu()">Browse Deals 🔥</a>
    </div>
  }
</header>
